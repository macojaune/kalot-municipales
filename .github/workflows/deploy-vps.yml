name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      DEPLOY_PATH: /var/www/kalotmunicipales
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          PORT="${VPS_PORT:-22}"
          ssh-keyscan -p "$PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync project files
        run: |
          PORT="${VPS_PORT:-22}"
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.netlify' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '.env.production' \
            --exclude '.DS_Store' \
            ./ "${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/"

      - name: Deploy on VPS
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" "${VPS_USER}@${VPS_HOST}" <<'EOF'
          set -euo pipefail
          cd /var/www/kalotmunicipales

          sudo cp deploy/caddy/kalotmunicipales.fr.caddy /var/www/caddy/kalotmunicipales.fr.caddy
          sudo touch /var/log/caddy/kalotmunicipales.log
          sudo chown caddy:caddy /var/log/caddy/kalotmunicipales.log
          sudo chmod 640 /var/log/caddy/kalotmunicipales.log
          sudo caddy reload --config /etc/caddy/Caddyfile --force

          docker compose --env-file .env.production -f docker-compose.vps.yml build
          docker compose --env-file .env.production -f docker-compose.vps.yml up -d

          curl -fsS http://127.0.0.1:3020/ >/dev/null
          curl -fsS http://127.0.0.1:3020/app.css >/dev/null
          EOF
