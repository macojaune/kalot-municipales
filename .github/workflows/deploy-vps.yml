name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/macojaune/kalot-municipales:latest
            ghcr.io/macojaune/kalot-municipales:${{ github.sha }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }}
            VITE_POSTHOG_HOST=${{ secrets.VITE_POSTHOG_HOST }}
            VITE_PUBLIC_SITE_URL=https://kalotmunicipales.fr

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-push
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      DEPLOY_PATH: /var/www/kalotmunicipales
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          PORT="${VPS_PORT:-22}"
          ssh-keyscan -p "$PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync project files
        run: |
          PORT="${VPS_PORT:-22}"
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.netlify' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '.env.production' \
            --exclude '.DS_Store' \
            ./ "${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/"

      - name: Deploy on VPS
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" "${VPS_USER}@${VPS_HOST}" <<'EOF'
          set -euo pipefail
          cd /var/www/kalotmunicipales

          echo "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${GHCR_PULL_USERNAME}" --password-stdin

          sudo cp deploy/caddy/kalotmunicipales.fr.caddy /var/www/caddy/kalotmunicipales.fr.caddy
          sudo touch /var/log/caddy/kalotmunicipales.log
          sudo chown caddy:caddy /var/log/caddy/kalotmunicipales.log
          sudo chmod 640 /var/log/caddy/kalotmunicipales.log
          sudo caddy reload --config /etc/caddy/Caddyfile --force

          export IMAGE_TAG="${GITHUB_SHA}"
          docker compose --env-file .env.production -f docker-compose.vps.yml pull
          docker compose --env-file .env.production -f docker-compose.vps.yml up -d

          curl -fsS http://127.0.0.1:3020/ >/dev/null
          curl -fsS http://127.0.0.1:3020/app.css >/dev/null
          EOF
