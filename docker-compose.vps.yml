services:
  kalotmunicipales:
    container_name: kalotmunicipales
    image: ghcr.io/macojaune/kalot-municipales:${IMAGE_TAG:-latest}
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3020:3000"
    restart: unless-stopped
